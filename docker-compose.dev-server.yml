services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bagisto-app
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env.docker
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bagisto

  web:
    image: nginx:1.27-alpine
    container_name: bagisto-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - bagisto

  mysql:
    image: mysql:8.0
    container_name: bagisto-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root}"
      MYSQL_DATABASE: "${DB_DATABASE:-bagisto}"
      MYSQL_USER: "${DB_USERNAME:-bagisto}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-bagisto}"
    ports:
      - "${DB_FORWARD_PORT:-3306}:3306"
    command: ["mysqld", "--default-authentication-plugin=mysql_native_password"]
    volumes:
      - bagisto-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - bagisto

  redis:
    image: redis:7-alpine
    container_name: bagisto-redis
    restart: unless-stopped
    ports:
      - "${REDIS_FORWARD_PORT:-6379}:6379"
    volumes:
      - bagisto-redis:/data
    networks:
      - bagisto

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bagisto-queue
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env.docker
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120 --queue=default,broadcastable,api-logs
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bagisto

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bagisto-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env.docker
    command: /bin/sh -lc "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - bagisto

  node:
    image: node:20-alpine
    container_name: bagisto-node
    profiles:
      - tools
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: sh -lc "npm install && npm run build"
    networks:
      - bagisto

networks:
  bagisto:
    driver: bridge

volumes:
  bagisto-mysql:
    driver: local
  bagisto-redis:
    driver: local

