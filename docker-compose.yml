services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: bagisto_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - bagisto
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    container_name: bagisto_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - bagisto
    depends_on:
      - app

  mysql:
    image: mysql:8.0
    container_name: bagisto_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_DATABASE:-bagisto}
      MYSQL_USER: ${DB_USERNAME:-bagisto}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bagisto123}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - bagisto

  redis:
    image: redis:alpine
    container_name: bagisto_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bagisto

networks:
  bagisto:
    driver: bridge

volumes:
  mysql_data:
  redis_data: